[connection]
catalog_name = "my_catalog"
catalog_backend = "pg_duckdb"
# postgres_connection = "dbname=my_catalog host=localhost port=5432 user=postgres"
# Override via environment variable: DUCKTRACKER_POSTGRES_CONNECTION

# secret_directory = "/path/to/secrets"

[migrations]
directory = "migrations"
schema_history_table = "ducktracker_schema_history"
target_schema = "public"

[behavior]
validate_on_migrate = true
